# nfpm configuration for building deb and rpm packages
# https://nfpm.goreleaser.com/configuration/
#
# Usage (called by .github/workflows/release.yml):
#   VERSION=1.0.0 nfpm pkg --packager deb --target dist/
#   VERSION=1.0.0 nfpm pkg --packager rpm --target dist/

name: cdi-health
arch: all
platform: linux
version: ${VERSION:-0.0.0}
section: utils
priority: optional
maintainer: Circular Drive Initiative <nick.hayhurst@interactdc.com>
description: |
  CDI Health - Open Source Storage Device Grading Toolkit.
  Scan, grade, and report on storage device health using
  smartmontools, nvme-cli, and other diagnostic tools.
vendor: Circular Drive Initiative
homepage: https://github.com/circulardrives/cdi-grading-tool
license: Apache-2.0

depends:
  - python3

recommends:
  - smartmontools
  - nvme-cli

contents:
  - src: ./build/pkg/opt/cdi-health/lib
    dst: /opt/cdi-health/lib
    type: tree

  - src: ./dashboard
    dst: /opt/cdi-health/dashboard
    type: tree

  - src: ./deploy
    dst: /opt/cdi-health/deploy
    type: tree

  - src: ./build/pkg/usr/local/bin/cdi-health
    dst: /usr/local/bin/cdi-health
    file_info:
      mode: 0755

  - src: ./build/pkg/usr/local/bin/cdi-health-api
    dst: /usr/local/bin/cdi-health-api
    file_info:
      mode: 0755

  - src: ./deploy/systemd/cdi-health-api.service
    dst: /usr/lib/systemd/system/cdi-health-api.service
    type: config|noreplace

overrides:
  deb:
    suggests:
      - sg3-utils
  rpm:
    suggests:
      - sg3_utils

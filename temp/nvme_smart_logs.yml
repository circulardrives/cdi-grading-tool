---
- name: Collect NVMe SMART logs and device information from b200 group
  hosts: b200
  become: yes
  gather_facts: yes
  vars:
    # Collection settings
    local_log_dir: "{{ playbook_dir }}/smart/dashboard/nvme_data"
    timestamp: "{{ ansible_date_time.epoch }}"
    # Retry settings for failed commands
    max_retries: 3
    retry_delay: 2

  tasks:
    - name: Create local log directory
      file:
        path: "{{ local_log_dir }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      become: no
      run_once: true

    - name: Check if nvme-cli is installed
      command: which nvme
      register: nvme_check
      failed_when: false
      changed_when: false

    - name: Install nvme-cli if not present
      package:
        name: nvme-cli
        state: present
      when: nvme_check.rc != 0

    - name: Get list of NVMe devices
      shell: nvme list -o json
      register: nvme_list_json
      changed_when: false
      failed_when: false
      retries: "{{ max_retries }}"
      delay: "{{ retry_delay }}"

    - name: Parse NVMe device list
      set_fact:
        nvme_devices: "{{ nvme_list_json.stdout | from_json | json_query('Devices[].DevicePath') }}"
      when: nvme_list_json.stdout is defined and nvme_list_json.stdout != ""

    - name: Debug - Show found NVMe devices
      debug:
        msg:
          - "Found {{ nvme_devices | length }} NVMe devices on {{ inventory_hostname }}"
          - "Devices: {{ nvme_devices | join(', ') }}"
      when: nvme_devices is defined and nvme_devices | length > 0

    - name: Skip hosts without NVMe devices
      debug:
        msg: "No NVMe devices found on {{ inventory_hostname }}"
      when: nvme_devices is not defined or nvme_devices | length == 0

    - name: Get controller information for each NVMe device
      shell: "nvme id-ctrl {{ item }} -o json"
      register: nvme_controllers
      with_items: "{{ nvme_devices }}"
      when: nvme_devices is defined and nvme_devices | length > 0
      failed_when: false
      retries: "{{ max_retries }}"
      delay: "{{ retry_delay }}"

    - name: Collect SMART logs for each NVMe device
      shell: "nvme smart-log {{ item }} -o json"
      register: smart_logs
      with_items: "{{ nvme_devices }}"
      when: nvme_devices is defined and nvme_devices | length > 0
      failed_when: false
      retries: "{{ max_retries }}"
      delay: "{{ retry_delay }}"

    - name: Collect Namespace ID data for each NVMe device
      shell: "nvme id-ns {{ item }} -o json"
      register: id_ns_logs
      with_items: "{{ nvme_devices }}"
      when: nvme_devices is defined and nvme_devices | length > 0
      failed_when: false
      retries: "{{ max_retries }}"
      delay: "{{ retry_delay }}"

    - name: Collect OCP SMART Add Log data for each NVMe device
      shell: "nvme ocp smart-add-log {{ item }} -o json"
      register: ocp_smart_logs
      with_items: "{{ nvme_devices }}"
      when: nvme_devices is defined and nvme_devices | length > 0
      failed_when: false
      retries: "{{ max_retries }}"
      delay: "{{ retry_delay }}"

    - name: Save complete NVMe logs locally
      copy:
        content: |
          {
            "hostname": "{{ inventory_hostname }}",
            "device": "{{ item.0.item }}",
            "timestamp": "{{ ansible_date_time.iso8601 }}",
            "smart_log": {{ item.1.stdout | default('{}') }},
            "id_ctrl": {{ item.2.stdout | default('{}') }},
            "id_ns": {{ item.3.stdout | default('{}') }},
            "ocp_smart_log": {{ item.4.stdout | default('{}') }}
          }
        dest: "{{ local_log_dir }}/{{ inventory_hostname }}_{{ (item.2.stdout | from_json).sn | default('UNKNOWN') | replace(' ', '') }}_{{ timestamp }}.json"
        mode: '0644'
      delegate_to: localhost
      become: no
      with_together:
        - "{{ smart_logs.results }}"
        - "{{ smart_logs.results }}"
        - "{{ nvme_controllers.results }}"
        - "{{ id_ns_logs.results }}"
        - "{{ ocp_smart_logs.results }}"
      when: 
        - nvme_devices is defined and nvme_devices | length > 0
        - item.0.stdout is defined
        - item.0.stdout != ""

    - name: Display collection summary
      debug:
        msg:
          - "Collected SMART logs from {{ nvme_devices | length }} NVMe devices on {{ inventory_hostname }}"
          - "JSON files saved to: {{ local_log_dir }}"
      when: nvme_devices is defined and nvme_devices | length > 0

- name: Generate CSV from collected JSON files
  hosts: localhost
  connection: local
  gather_facts: yes
  vars:
    local_log_dir: "{{ playbook_dir }}/smart/dashboard/nvme_data"
    timestamp: "{{ ansible_date_time.epoch }}"
  tasks:
    - name: Generate CSV from JSON files
      command: python3 {{ playbook_dir }}/smart/merge_nvme_data.py {{ local_log_dir }} {{ timestamp }}
      register: csv_generation
      changed_when: csv_generation.rc == 0
      become: no

    - name: Show final collection summary
      debug:
        msg:
          - "=== NVMe SMART Collection Complete ==="
          - "JSON files: {{ local_log_dir }}/*.json"
          - "CSV file: {{ local_log_dir }}/nvme_smart_data_{{ timestamp }}.csv"
          - "Summary report: {{ local_log_dir }}/collection_summary_{{ timestamp }}.md"

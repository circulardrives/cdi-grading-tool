# Consolidated CI: build, lint, pytest (matrix), license, optional mypy, dashboard, wheel smoke.
name: ci

on:
  push:
    branches: [main, develop]
    tags: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: >-
    ${{ github.event_name == 'pull_request'
    && format('{0}-{1}', github.workflow_ref, github.event.pull_request.number)
    || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build sdist & wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: dist/*
          if-no-files-found: error

  lint:
    name: Ruff + pre-commit hooks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: pre-commit/action@v3.0.1

  test:
    name: Pytest Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install OS tools (tests expect nvme/smartctl/sg in PATH)
        run: |
          sudo apt-get update
          sudo apt-get install --yes nvme-cli smartmontools sg3-utils

      - name: Install package (dev + API for HTTP tests)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,api]'

      - name: Run tests
        run: |
          pytest tests/ -v \
            --override-ini="addopts=--strict-markers --strict-config --cov=cdi_health --cov-report=xml --cov-report=term-missing"

      - name: Upload coverage (Python 3.12 only)
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  license-headers:
    name: License headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Verify license headers
        run: |
          licenseheaders --ext py --tmpl license.template --current-year \
            --owner 'Circular Drive Initiative' --projname 'CDI Health' \
            --projurl 'https://github.com/circulardrives/cdi-grading-tool/'
          git diff --exit-code

  mypy:
    name: Mypy (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,api]'

      - name: Mypy
        run: mypy src/cdi_health --ignore-missing-imports

  dashboard:
    name: Dashboard build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install & build
        working-directory: dashboard
        run: |
          npm ci
          npm run build

  smoke-wheel:
    name: Smoke install wheel + mock scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: packages
          path: dist/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OS tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes nvme-cli smartmontools sg3-utils

      - name: Install wheel only
        run: |
          python -m venv venv
          venv/bin/pip install --upgrade pip
          venv/bin/pip install dist/*.whl

      - name: CLI entrypoints
        run: |
          venv/bin/cdi-health --help
          venv/bin/cdi-health-api --help

      - name: Mock scan from installed package
        run: |
          venv/bin/python <<'PY'
          from importlib.resources import as_file, files
          import subprocess
          import sys

          with as_file(files("cdi_health.mock_data")) as mock_path:
              subprocess.check_call(
                  [
                      "venv/bin/cdi-health",
                      "scan",
                      "--mock-data",
                      str(mock_path),
                      "-o",
                      "json",
                  ],
                  cwd=".",
              )
          print("mock scan ok", file=sys.stderr)
          PY

  required:
    if: always()
    name: Required checks
    runs-on: ubuntu-latest
    needs:
      - build
      - lint
      - test
      - license-headers
      - dashboard
      - smoke-wheel
    steps:
      - uses: re-actors/alls-green@release/v1.2
        with:
          jobs: ${{ toJSON(needs) }}

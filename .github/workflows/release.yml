name: release

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build:
    name: 📦 Build packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Extract version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0~dev.$(date +%Y%m%d%H%M%S)+$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build wheel and sdist
        run: |
          python -m pip install build
          python -m build

      - name: Prepare package layout
        run: |
          mkdir -p build/pkg/opt/cdi-health/lib
          mkdir -p build/pkg/usr/local/bin

          pip install --target=build/pkg/opt/cdi-health/lib dist/*.whl

          cat > build/pkg/usr/local/bin/cdi-health << 'WRAPPER'
          #!/bin/sh
          export PYTHONPATH=/opt/cdi-health/lib
          exec python3 -m cdi_health "$@"
          WRAPPER
          chmod +x build/pkg/usr/local/bin/cdi-health

          cat > build/pkg/usr/local/bin/cdi-health-api << 'WRAPPER'
          #!/bin/sh
          export PYTHONPATH=/opt/cdi-health/lib
          exec python3 -c "from cdi_health.api.server import main; main()" "$@"
          WRAPPER
          chmod +x build/pkg/usr/local/bin/cdi-health-api

      - name: Install nfpm
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update
          sudo apt-get install -y nfpm

      - name: Build deb package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: nfpm pkg --packager deb --target dist/

      - name: Build rpm package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: nfpm pkg --packager rpm --target dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-packages
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
          if-no-files-found: error

  release:
    name: 🚀 Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: release-packages
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
